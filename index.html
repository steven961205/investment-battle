// 取得目前美股市場時段（台灣時間）
function getMarketSession(){
    const now = new Date();
    // 轉成美東時間
    const et = new Date(now.toLocaleString('en-US',{timeZone:'America/New_York'}));
    const h=et.getHours(), m=et.getMinutes(), day=et.getDay();
    if(day===0||day===6) return '週末';
    const totalMin=h*60+m;
    if(totalMin>=240&&totalMin<570)  return '🌙 夜盤';   // 04:00~09:30 ET
    if(totalMin>=570&&totalMin<960)  return '🔔 盤中';   // 09:30~16:00 ET
    if(totalMin>=960&&totalMin<1200) return '🌆 盤後';   // 16:00~20:00 ET
    return '💤 休市';
}
// 回傳 { price(收盤), extPrice(盤後/夜盤), session } 物件
async function fetchFinnhubPrice(ticker){
    const CF_PROXY='https://yf-proxy.steven961205.workers.dev';

    const v8Url=`https://query1.finance.yahoo.com/v8/finance/chart/${encodeURIComponent(ticker)}?interval=1m&range=1d&includePrePost=true`;
    try{
        const r=await fetch(`${CF_PROXY}?url=${encodeURIComponent(v8Url)}`,{signal:AbortSignal.timeout(10000)});
        if(r.ok){
            const raw=await r.json();
            const result=raw?.chart?.result?.[0];
            const meta=result?.meta;
            if(meta){
                const pre=meta.currentTradingPeriod?.pre;
                const post=meta.currentTradingPeriod?.post;
                const regular=meta.currentTradingPeriod?.regular;
                const closes=result?.indicators?.quote?.[0]?.close||[];
                const volumes=result?.indicators?.quote?.[0]?.volume||[];
                const timestamps=result?.timestamp||[];

                // 收盤價 = meta.regularMarketPrice（最可靠）
                const regularPrice=meta.regularMarketPrice||null;

                // 分別找各時段最後一筆有效收盤價（不管現在幾點）
                let lastRegularClose=null, lastPostClose=null, lastPreClose=null;

                for(let i=timestamps.length-1;i>=0;i--){
                    const ts=timestamps[i];
                    const c=closes[i];
                    const v=volumes[i];
                    if(!c||c<=0) continue;

                    if(post && ts>=post.start && ts<=post.end){
                        if(!lastPostClose) lastPostClose=c;
                    } else if(regular && ts>=regular.start && ts<=regular.end){
                        if(!lastRegularClose) lastRegularClose=c;
                    } else if(pre && ts>=pre.start && ts<pre.end){
                        if(!lastPreClose) lastPreClose=c;
                    }
                    // 三個都找到就停
                    if(lastPostClose&&lastRegularClose&&lastPreClose) break;
                }

                // 判斷目前時段（用美東時間 Unix timestamp）
                const nowSec=Date.now()/1000;
                let session='💤 休市';
                let extPrice=null;
                let currentPrice=regularPrice;

                if(regular && nowSec>=regular.start && nowSec<=regular.end){
                    // 盤中：用時間序列最後收盤（最即時）
                    session='🔔 盤中';
                    if(lastRegularClose) currentPrice=lastRegularClose;
                } else if(pre && nowSec>=pre.start && nowSec<pre.end){
                    // 夜盤/盤前
                    session='🌙 夜盤';
                    if(lastPreClose&&lastPreClose!==regularPrice) extPrice=lastPreClose;
                } else if(post && nowSec>=post.start && nowSec<=post.end){
                    // 盤後
                    session='🌆 盤後';
                    if(lastPostClose&&lastPostClose!==regularPrice) extPrice=lastPostClose;
                } else {
                    // 休市但有盤後資料，仍顯示
                    if(lastPostClose&&lastPostClose!==regularPrice){
                        extPrice=lastPostClose;
                        session='🌆 盤後（已結束）';
                    }
                }

                if(currentPrice>0){
                    console.log(`[${ticker}] 現價:${currentPrice} 盤後:${lastPostClose} 夜盤:${lastPreClose} (${session})`);
                    return {
                        price: currentPrice,
                        postPrice: (lastPostClose&&lastPostClose!==regularPrice)?lastPostClose:null,
                        prePrice:  (lastPreClose &&lastPreClose !==regularPrice)?lastPreClose :null,
                        session
                    };
                }
            }
        }
    }catch(e){console.warn(`CF v8失敗(${ticker}):`,e.message);}

    // Finnhub 備援
    try{
        const r=await fetch(`https://finnhub.io/api/v1/quote?symbol=${encodeURIComponent(ticker)}&token=${FINNHUB_KEY}`,{signal:AbortSignal.timeout(8000)});
        const d=await r.json();
        const price=(d.c&&d.c>0)?d.c:(d.pc>0?d.pc:null);
        if(price) return {price, postPrice:null, prePrice:null, session:'💤 休市'};
    }catch(e){}
    return null;
}
async function fetchTWSEPrice(ticker){
    const code = ticker.replace('.TW','').replace('.TWO','');

    // 策略1：Fugle 即時報價（盤中）
    try{
        const r = await fetch(
            `https://api.fugle.tw/marketdata/v1.0/stock/intraday/quote/${code}`,
            { headers:{'X-API-KEY': FUGLE_KEY}, signal:AbortSignal.timeout(8000) }
        );
        if(r.ok){
            const d = await r.json();
            // closePrice=收盤, lastPrice=最新成交, previousClose=昨收
            const price = d.closePrice || d.lastPrice || d.previousClose || null;
            if(price && price > 0){ console.log('台股Fugle即時成功', code, price); return price; }
        }
    }catch(e){ console.warn('Fugle即時失敗', code, e.message); }

    // 策略2：Fugle 歷史收盤（收盤後/非交易時間）
    try{
        const today = new Date();
        const dateStr = today.toISOString().slice(0,10);
        // 往前抓5天確保有資料
        const past = new Date(today); past.setDate(past.getDate()-7);
        const pastStr = past.toISOString().slice(0,10);
        const r = await fetch(
            `https://api.fugle.tw/marketdata/v1.0/stock/historical/candles/${code}?startDate=${pastStr}&endDate=${dateStr}&resolution=D`,
            { headers:{'X-API-KEY': FUGLE_KEY}, signal:AbortSignal.timeout(8000) }
        );
        if(r.ok){
            const d = await r.json();
            // candles 陣列最後一筆是最新交易日
            const candles = d.data || d.candles || [];
            if(candles.length > 0){
                const last = candles[candles.length-1];
                const price = last.close || null;
                if(price && price > 0){ console.log('台股Fugle歷史成功', code, price); return price; }
            }
        }
    }catch(e){ console.warn('Fugle歷史失敗', code, e.message); }

    return null;
}

async function searchTickers(query){
    if(!query)return[];

    // 台股判斷：純數字 或 數字.TW / TWSE:數字 格式
    const twMatch = query.match(/^(TWSE:)?(\d{4,6})/i);
    if(twMatch){
        const code = twMatch[2];
        // 直接回傳台股選項，讓使用者確認
        return[
            {symbol:`${code}.TW`,  shortname:`台股上市 ${code}`, exchDisp:'TWSE'},
            {symbol:`${code}.TWO`, shortname:`台股上櫃 ${code}`, exchDisp:'TPEx'},
        ];
    }

    // 美股：走 Finnhub 搜尋
    try{
        const r=await fetch(`https://finnhub.io/api/v1/search?q=${encodeURIComponent(query)}&token=${FINNHUB_KEY}`,{signal:AbortSignal.timeout(5000)});
        const d=await r.json();
        return(d?.result||[]).filter(q=>q.type==='Common Stock'||q.type==='ETP'||q.type==='ADR').slice(0,8).map(q=>({symbol:q.symbol,shortname:q.description,exchDisp:q.type}));
    }catch{return[];}
}

// ── 格式化 ────────────────────────────────
function fmtRaw(amount,currency,decimals=0){const abs=Math.abs(amount);if(currency==='TWD')return`NT$ ${abs.toLocaleString('zh-TW',{minimumFractionDigits:decimals,maximumFractionDigits:decimals})}`;return`$${abs.toLocaleString('en-US',{minimumFractionDigits:2,maximumFractionDigits:2})}`;}
function fmtC(amount,currency,white=false){const raw=fmtRaw(amount,currency);const neg=amount<0;const sign=neg?'-':'';if(white)return`<span class="mono font-bold text-white">${sign}${raw}</span>`;const cls=neg?'text-red-400 font-bold mono':(amount===0?'text-slate-400 mono':'text-emerald-400 font-bold mono');return`<span class="${cls}">${sign}${raw}</span>`;}

// ── 渲染 Dashboard ────────────────────────
function renderDashboard(){
    let lb=[];
    const pdiv=document.getElementById('portfolios');pdiv.innerHTML='';
    participants.forEach(p=>{
        const initCap=getFixedInitialCapital(p.currency);
        const stocks=Array.isArray(p.stocks)?p.stocks:[];
        const trades=Array.isArray(p.trades)?p.trades:[];
        let totalMV=0,totalUnPnl=0;
        stocks.forEach(s=>{
            // 最新價優先順序：夜盤 > 盤後 > 收盤
            const latestPrice=s.prePrice||s.postPrice||s.currentPrice||0;
            const mv=(s.shares||0)*latestPrice;
            const cost=(s.shares||0)*(s.buyPrice||0);
            totalMV+=mv;
            totalUnPnl+=(mv-cost);
        });
        const realPnl=trades.reduce((sum,t)=>sum+(parseFloat(t.pnl)||0),0);
        // 帳戶淨值 = 初始本金 + 已實現損益 + 未實現損益
        const netVal=initCap+realPnl+totalUnPnl;
        const retPct=(((netVal-initCap)/initCap)*100).toFixed(2);
        const valTWD=p.currency==='USD'?netVal*usdToTwd:netVal;
        // 當前淨值（現金 + 持股市值）
        const currentVal=p.cash+totalMV;
        // 槓桿使用率 = (持股總市值 / (初始本金 + 已實現損益)) - 1
        const leverageBase = initCap + realPnl;
        const actualLevPct = leverageBase > 0 ? ((totalMV / leverageBase) - 1) * 100 : 0;
        const hasLev = actualLevPct > 0.01;
        lb.push({name:p.name,totalValueTWD:valTWD,returnPct:retPct,initCapStr:fmtRaw(initCap,p.currency),netValueStr:fmtRaw(netVal,p.currency)});

            ?`<div class="holding-row text-center text-slate-500">目前無持股紀錄</div>`

                const mv=(s.shares||0)*latestPrice;
                const cost=(s.shares||0)*(s.buyPrice||0);
                const pnl=mv-cost;
                const ps=pnl>=0?'+':'';
                const pc=pnl<0?'text-red-400':'text-emerald-400';

                const postPrice=s.postPrice||null;
                const prePrice =s.prePrice ||null;
                const session  =s.session  ||'';

                // 盤後損益
                const postPnl=postPrice?((postPrice-(s.buyPrice||0))*(s.shares||0)):null;
                const postPc=postPnl!=null?(postPnl>=0?'text-emerald-400':'text-red-400'):'';
                const postSign=postPnl!=null?(postPnl>=0?'+':''):'';

                // 夜盤損益
                const prePnl=prePrice?((prePrice-(s.buyPrice||0))*(s.shares||0)):null;
                const prePc=prePnl!=null?(prePnl>=0?'text-emerald-400':'text-red-400'):'';
                const preSign=prePnl!=null?(prePnl>=0?'+':''):'';

                return`<div class="holding-row">
                    <div style="display:flex;justify-content:space-between;margin-bottom:5px;">

                        <span>${s.prePrice?'🌙 夜盤':s.postPrice?'🌆 盤後':'收盤'} <span class="mono text-cyan-300 font-bold">${fmtRaw(latestPrice,p.currency,2)}</span></span>
                        <span class="font-bold mono ${pc}">${ps}${fmtRaw(pnl,p.currency)} <span style="opacity:.8">(${pnlPctSign}${pnlPct}%)</span></span>
                    </div>
                    ${(postPrice&&!prePrice)?`<div style="display:flex;justify-content:space-between;align-items:center;margin-top:5px;padding-top:5px;border-top:1px solid rgba(30,58,95,.5);" class="text-xs">
                        <span style="color:var(--text-muted);">收盤 ${fmtRaw(s.currentPrice||0,p.currency,2)}</span>
                    </div>`:''}
                    ${(postPrice&&prePrice)?`<div style="display:flex;justify-content:space-between;align-items:center;margin-top:5px;padding-top:5px;border-top:1px solid rgba(30,58,95,.5);" class="text-xs">

                    </div>`:''}
                </div>`;
              }).join('');

        const realSign=realPnl>=0?'+':'';const realCls=realPnl>=0?'profit-pos':'profit-neg';
        const upSign=totalUnPnl>=0?'+':'';const upCls=totalUnPnl<0?'text-red-400':'text-emerald-400';

                        <span class="mono font-bold text-cyan-300" style="font-size:13px;">${t.ticker||'--'}</span>

                        </div>
                    </div>
                    <div class="trade-card-row" style="color:var(--text-secondary);font-size:11px;">
                        <span>${(t.shares||0).toLocaleString()} 股</span>
                        <span>買入 <span class="mono text-white">${fmtRaw(bp,p.currency,2)}</span></span>
                        <span>賣出 <span class="mono text-white">${fmtRaw(sp,p.currency,2)}</span></span>
                        ${t.date?`<span style="color:var(--text-muted)">${t.date}</span>`:''}
                    </div>
                </div>`;
              }).join('');

        pdiv.innerHTML+=`<div class="portfolio-card">
            <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:16px;">
                <div style="display:flex;align-items:center;gap:6px;">

                    <button onclick="editName('${p.name}')" title="修改名稱" style="background:none;border:none;color:var(--text-muted);cursor:pointer;font-size:13px;padding:2px 4px;transition:color .15s;" onmouseover="this.style.color='var(--accent-blue)'" onmouseout="this.style.color='var(--text-muted)'">✏️</button>

                <div class="stat-row"><span class="stat-label">當前淨值（現金+持股）</span><span class="mono font-bold text-cyan-400 text-sm">${fmtRaw(currentVal,p.currency)}</span></div>
                <div class="stat-row">
                    <span class="stat-label">槓桿使用率</span>

let slotCounter=0,slotAcTimers={},slotAcItems={},slotAcIdx={};

function openModal(name){

}
function editName(oldName){
    const newName = prompt(`請輸入新的參賽者名稱：`, oldName);
    if(!newName || newName.trim()==='' || newName.trim()===oldName) return;
    const trimmed = newName.trim();
    // 檢查是否重複
    if(participants.some(p=>p.name===trimmed)){alert('此名稱已被使用！');return;}
    const pi = participants.findIndex(p=>p.name===oldName);
    if(pi===-1) return;
    const updated = {...participants[pi], name: trimmed};
    db.ref('competitionData/'+pi).set(updated);
    setStatus('loading','🟡 更新名稱中...');
}

function closeModal(){document.getElementById('editModal').classList.remove('open');document.getElementById('stockSlots').innerHTML='';}

function removeSlot(btn){btn.closest('.stock-slot').remove();renumberSlots();}

function onSlotTickerChange(id, val){
    // 根據代號是否為台股，切換現價標籤顏色和提示文字
    const slot = document.querySelector(`.stock-slot[data-slot-id="${id}"]`);

    if(label){
        label.textContent = isTW ? '現價（手動輸入）' : '即時現價（自動）';
        label.style.color = isTW ? 'var(--accent-amber)' : 'var(--text-secondary)';

    }
}
function renumberSlots(){document.querySelectorAll('.stock-slot').forEach((el,i)=>el.querySelector('.slot-num').textContent=`持股 #${i+1}`);}

async function onSlotInput(id,val){
    clearTimeout(slotAcTimers[id]);
    const list=document.getElementById(`ac-list-${id}`);
    if(!val||val.length<1){list.classList.remove('open');list.innerHTML='';return;}
    list.innerHTML='<div class="ac-spinner">搜尋中...</div>';list.classList.add('open');
    slotAcTimers[id]=setTimeout(async()=>{
        const results=await searchTickers(val);slotAcItems[id]=results;slotAcIdx[id]=-1;
        if(!results.length){list.innerHTML='<div class="ac-spinner">找不到相關股票</div>';return;}
        list.innerHTML=results.map((q,i)=>`<div class="ac-item" onclick="selectSlot(${id},${i})"><div style="display:flex;align-items:center;gap:8px;"><span class="ac-ticker">${q.symbol}</span><span class="ac-name">${q.shortname||''}</span></div><span class="ac-exch">${q.exchDisp||''}</span></div>`).join('');
    },350);
}
function onSlotKey(e,id){
    const list=document.getElementById(`ac-list-${id}`);if(!list.classList.contains('open'))return;
    const items=list.querySelectorAll('.ac-item');if(!items.length)return;
    if(e.key==='ArrowDown'){e.preventDefault();slotAcIdx[id]=Math.min(slotAcIdx[id]+1,items.length-1);}
    else if(e.key==='ArrowUp'){e.preventDefault();slotAcIdx[id]=Math.max(slotAcIdx[id]-1,0);}
    else if(e.key==='Enter'&&slotAcIdx[id]>=0){e.preventDefault();selectSlot(id,slotAcIdx[id]);return;}
    else if(e.key==='Escape'){list.classList.remove('open');return;}
    items.forEach((el,i)=>el.classList.toggle('active',i===slotAcIdx[id]));
    if(slotAcIdx[id]>=0)items[slotAcIdx[id]].scrollIntoView({block:'nearest'});
}
async function selectSlot(id,idx){
    const q=slotAcItems[id]?.[idx];if(!q)return;
    const slot=document.querySelector(`.stock-slot[data-slot-id="${id}"]`);if(!slot)return;
    slot.querySelector('.slot-ticker').value=q.symbol;
    document.getElementById(`ac-list-${id}`).classList.remove('open');
    const priceInfo=slot.querySelector('.slot-price-info');
    const priceSpan=slot.querySelector('.slot-cur-price');
    const priceHidden=slot.querySelector('.slot-cur-hidden');
    if(priceSpan) priceSpan.textContent='取得中...';
    if(priceInfo) priceInfo.style.display='';
    const price=await fetchStockPrice(q.symbol);
    if(priceHidden) priceHidden.value = price!=null ? price : 0;
    if(priceSpan) priceSpan.textContent = price!=null ? price.toFixed(2) : '取得失敗';
}

function updateModalSummary(){
    const currency=document.getElementById('editCurrency').value;
    const initCap=getFixedInitialCapital(currency);
    document.getElementById('displayInitialCapital').value=fmtRaw(initCap,currency);
    const cash=parseFloat(document.getElementById('editCash').value)||0;
    let stockValue=0;
    document.querySelectorAll('.stock-slot').forEach(slot=>{
        const shares=parseFloat(slot.querySelector('.slot-shares').value)||0;
        const price=parseFloat(slot.querySelector('.slot-cur-hidden').value)||0;
        stockValue+=shares*price;
    });
    // 帳戶淨值（從 Firebase 現有資料算，這裡簡化顯示初始本金+現金變化）
    // Modal 中無法知道歷史損益，所以帳戶淨值欄位僅供參考顯示現金+持股
    const currentVal=cash+stockValue;

    // 帳戶淨值預覽（現金+持股市值，即當前掌握的總資產）
    const preview=document.getElementById('displayNetValue');
    if(preview){preview.value=fmtRaw(currentVal,currency);}

    // 當前淨值（同上，清楚標示）
    const curValEl=document.getElementById('displayCurrentValue');
    if(curValEl){curValEl.value=fmtRaw(currentVal,currency);}
}

function saveData(){
    const name=document.getElementById('editName').value;
    const pi=participants.findIndex(p=>p.name===name);if(pi===-1)return;
    const newStocks=[];
    document.querySelectorAll('.stock-slot').forEach(slot=>{
        const ticker=(slot.querySelector('.slot-ticker').value||'').toUpperCase().trim();
        const shares=parseFloat(slot.querySelector('.slot-shares').value)||0;
        const buyPrice=parseFloat(slot.querySelector('.slot-buyprice').value)||0;
        const currentPrice=parseFloat(slot.querySelector('.slot-cur-hidden').value)||0;
        if(ticker&&shares>0)newStocks.push({ticker,shares,buyPrice,currentPrice});
    });
    const updated={...participants[pi],currency:document.getElementById('editCurrency').value,cash:parseFloat(document.getElementById('editCash').value)||0,stocks:newStocks};
    db.ref('competitionData/'+pi).set(updated);
    closeModal();setStatus('loading','🟡 同步變更中...');
}

// ── 歷史交易 Modal ────────────────────────
function openTradeModal(name){
    document.getElementById('tradeName').value=name;
    document.getElementById('tradeModalTitle').textContent=`新增交易紀錄 — ${name}`;
    ['tradeTicker','tradeShares','tradeBuyPrice','tradeSellPrice','tradePnl'].forEach(id=>document.getElementById(id).value='');
    document.getElementById('tradeCalcHint').classList.add('hidden');
    document.getElementById('tradeModal').classList.add('open');
}
function closeTradeModal(){document.getElementById('tradeModal').classList.remove('open');}
function calcTradePreview(){
    const sh=parseFloat(document.getElementById('tradeShares').value)||0;
    const bp=parseFloat(document.getElementById('tradeBuyPrice').value)||0;
    const sp=parseFloat(document.getElementById('tradeSellPrice').value)||0;
    if(sh>0&&bp>0&&sp>0){const pnl=(sp-bp)*sh;const el=document.getElementById('tradeCalcValue');el.textContent=(pnl>=0?'+':'')+pnl.toFixed(2);el.className='mono font-bold '+(pnl>=0?'text-emerald-400':'text-red-400');document.getElementById('tradePnl').value=pnl.toFixed(2);document.getElementById('tradeCalcHint').classList.remove('hidden');}
}
function saveTrade(){
    const name=document.getElementById('tradeName').value;const pi=participants.findIndex(p=>p.name===name);if(pi===-1)return;
    const ticker=document.getElementById('tradeTicker').value.toUpperCase().trim();
    const shares=parseFloat(document.getElementById('tradeShares').value)||0;
    const buyPrice=parseFloat(document.getElementById('tradeBuyPrice').value)||0;
    const sellPrice=parseFloat(document.getElementById('tradeSellPrice').value)||0;
    const pnl=parseFloat(document.getElementById('tradePnl').value)||0;
    if(!ticker||shares<=0){alert('請填入股票代號和股數');return;}
    const t=[...(participants[pi].trades||[]),{ticker,shares,buyPrice,sellPrice,pnl,date:new Date().toLocaleDateString('zh-TW')}];
    db.ref('competitionData/'+pi+'/trades').set(t);
    closeTradeModal();setStatus('loading','🟡 同步交易紀錄中...');
}
function deleteTrade(name,idx){
    if(!confirm('確定刪除這筆交易紀錄？'))return;
    const pi=participants.findIndex(p=>p.name===name);if(pi===-1)return;
    const t=[...(participants[pi].trades||[])];t.splice(idx,1);
    db.ref('competitionData/'+pi+'/trades').set(t);
}

document.addEventListener('keydown',e=>{if(e.key==='Escape'){closeModal();closeTradeModal();}});

const endDate=new Date('2026-11-04T00:00:00').getTime();
(function tick(){const d=endDate-Date.now();if(d<0){document.getElementById('countdown').textContent='比賽已結束！';return;}
document.getElementById('countdown').textContent=`${Math.floor(d/86400000)} 天 ${Math.floor(d%86400000/3600000)} 時 ${Math.floor(d%3600000/60000)} 分`;setTimeout(tick,60000);})();

// ── 自動刷新股價（每 60 秒，支援美股夜盤 24 小時即時）────────────────
const REFRESH_INTERVAL = 10; // 秒（盡量即時）
let refreshTimer = null;
let nextRefreshIn = REFRESH_INTERVAL;

// 更新右上角狀態列的倒數
function updateRefreshCountdown(){
    const statusEl = document.getElementById('system-status');
    if(statusEl && statusEl.className.includes('status-ok')){
        const base = `🟢 已連線｜1 USD = ${usdToTwd.toFixed(2)} TWD`;
        statusEl.textContent = `${base}｜${new Date().toLocaleTimeString('zh-TW')}｜下次刷新：${nextRefreshIn}s`;
    }
}

async function refreshPrices(){
    if(participants.length === 0) return;
    setStatus('loading','🔄 刷新股價中...');
    let anyUpdate = false;
    await Promise.all(participants.map(async(p, pi)=>{
        const stocks = Array.isArray(p.stocks) ? p.stocks : [];
        await Promise.all(stocks.map(async(s, si)=>{
            if(!s.ticker) return;
            // 台股只在交易時間更新（週一~五 09:00~13:30 台灣時間）
            const isTW = s.ticker.endsWith('.TW') || s.ticker.endsWith('.TWO');
            if(isTW){
                const now = new Date();
                const twHour = new Date(now.toLocaleString('en-US',{timeZone:'Asia/Taipei'}));
                const h = twHour.getHours(), m = twHour.getMinutes(), day = twHour.getDay();
                const isWeekday = day>=1 && day<=5;
                const isMarketHour = (h===9&&m>=0)||(h>=10&&h<=12)||(h===13&&m<=30);
                if(!isWeekday || !isMarketHour) return; // 台股非交易時間不刷新
            }
            const result = await fetchStockPrice(s.ticker);
            if(!result) return;
            if(result.price !== participants[pi].stocks[si].currentPrice ||
               result.postPrice !== participants[pi].stocks[si].postPrice ||
               result.prePrice  !== participants[pi].stocks[si].prePrice){
                participants[pi].stocks[si].currentPrice = result.price;
                participants[pi].stocks[si].postPrice    = result.postPrice||null;
                participants[pi].stocks[si].prePrice     = result.prePrice||null;
                participants[pi].stocks[si].session      = result.session||'';
                anyUpdate = true;
            }
        }));
    }));
    if(anyUpdate) renderDashboard();
    const session = getMarketSession();
    setStatus('ok', `🟢 已連線｜1 USD = ${usdToTwd.toFixed(2)} TWD｜美股 ${session}｜${new Date().toLocaleTimeString('zh-TW')}`);
}

// 倒數計時器（每秒更新顯示）
function startRefreshCountdown(){
    clearInterval(refreshTimer);
    nextRefreshIn = REFRESH_INTERVAL;
    refreshTimer = setInterval(async()=>{
        nextRefreshIn--;
        updateRefreshCountdown();
        if(nextRefreshIn <= 0){
            nextRefreshIn = REFRESH_INTERVAL;
            await refreshPrices();
        }
    }, 1000);
}

// Firebase 資料載入完成後啟動自動刷新
db.ref('competitionData').on('value', ()=>{
    // 資料有更新時重置倒數
    startRefreshCountdown();
}, { onlyOnce: false });

// 頁面可見性 API：切回前台時立即刷新
document.addEventListener('visibilitychange', ()=>{
    if(document.visibilityState === 'visible'){
        refreshPrices();
        startRefreshCountdown();
    } else {
        clearInterval(refreshTimer);
    }
});
</script>
