<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>頂尖對決：六個月投資績效大賽</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;600&display=swap');
        :root {
            --bg-base:#080e1a;--bg-card:#0d1726;--bg-elevated:#111f35;--bg-input:#0a1628;
            --border:#1e3a5f;--border-bright:#2a5490;
            --text-primary:#e8f4fd;--text-secondary:#7ba5cc;--text-muted:#3d6080;
            --accent-blue:#3b82f6;--accent-cyan:#06b6d4;--accent-green:#10b981;
            --accent-red:#ef4444;--accent-amber:#f59e0b;
        }
        *{box-sizing:border-box;}
        body{font-family:'Inter',sans-serif;background-color:var(--bg-base);color:var(--text-primary);min-height:100vh;
            background-image:radial-gradient(ellipse 80% 50% at 50% -20%,rgba(59,130,246,.08) 0%,transparent 70%),
                             radial-gradient(ellipse 40% 30% at 80% 80%,rgba(6,182,212,.05) 0%,transparent 60%);}
        .mono{font-family:'JetBrains Mono',monospace;}
        .card{background:var(--bg-card);border:1px solid var(--border);border-radius:12px;}
        .header-glow{text-shadow:0 0 40px rgba(59,130,246,.5),0 0 80px rgba(59,130,246,.2);}
        .countdown-badge{background:linear-gradient(135deg,#1e3a5f,#0f2a4a);border:1px solid var(--accent-blue);border-radius:999px;padding:8px 24px;display:inline-block;}
        .status-pill{display:inline-flex;align-items:center;gap:8px;padding:6px 16px;border-radius:999px;font-size:12px;font-weight:600;border:1px solid transparent;}
        .status-loading{background:rgba(245,158,11,.1);border-color:rgba(245,158,11,.3);color:var(--accent-amber);}
        .status-ok{background:rgba(16,185,129,.1);border-color:rgba(16,185,129,.3);color:var(--accent-green);}
        .rank-card{display:flex;justify-content:space-between;align-items:center;padding:14px 20px;border-radius:10px;border:1px solid var(--border);background:var(--bg-elevated);transition:border-color .2s,box-shadow .2s;}
        .rank-card:hover{border-color:var(--border-bright);box-shadow:0 4px 20px rgba(0,0,0,.3);}
        .rank-card.rank-1{border-color:rgba(251,191,36,.4);background:linear-gradient(135deg,rgba(251,191,36,.06),var(--bg-elevated));}
        .rank-card.rank-2{border-color:rgba(156,163,175,.4);}
        .rank-card.rank-3{border-color:rgba(180,83,9,.4);}
        .portfolio-card{background:var(--bg-card);border:1px solid var(--border);border-radius:14px;padding:20px;transition:border-color .2s;}
        .portfolio-card:hover{border-color:var(--border-bright);}
        .net-value-box{background:var(--bg-input);border:1px solid var(--border-bright);border-radius:10px;padding:16px;}
        .stat-row{display:flex;justify-content:space-between;align-items:center;padding:5px 0;font-size:13px;}
        .stat-label{color:var(--text-secondary);}
        .holding-row{background:var(--bg-input);border:1px solid var(--border);border-radius:8px;padding:10px 12px;margin-bottom:6px;font-size:12px;}
        .btn-update{background:linear-gradient(135deg,#1e3a5f,#162e4d);border:1px solid var(--border-bright);color:var(--text-primary);padding:6px 14px;border-radius:6px;font-size:12px;font-weight:600;cursor:pointer;transition:all .2s;}
        .btn-update:hover{background:linear-gradient(135deg,#2a5490,#1e3a5f);box-shadow:0 0 12px rgba(59,130,246,.3);}
        .btn-cancel{padding:9px 18px;background:rgba(30,58,95,.5);border:1px solid var(--border);color:var(--text-secondary);border-radius:7px;font-size:13px;font-weight:600;cursor:pointer;transition:all .2s;}
        .btn-cancel:hover{background:rgba(30,58,95,.8);color:var(--text-primary);}
        .btn-save{padding:9px 20px;background:linear-gradient(135deg,#2563eb,#1d4ed8);border:none;color:#fff;border-radius:7px;font-size:13px;font-weight:700;cursor:pointer;transition:all .2s;box-shadow:0 4px 15px rgba(37,99,235,.4);}
        .btn-save:hover{background:linear-gradient(135deg,#3b82f6,#2563eb);transform:translateY(-1px);}
        .btn-add-stock{display:flex;align-items:center;gap:5px;background:rgba(59,130,246,.1);border:1px solid rgba(59,130,246,.3);color:var(--accent-blue);padding:6px 12px;border-radius:6px;font-size:12px;font-weight:700;cursor:pointer;transition:all .2s;}
        .btn-add-stock:hover{background:rgba(59,130,246,.2);}
        .btn-add-trade{display:flex;align-items:center;gap:5px;background:rgba(16,185,129,.1);border:1px solid rgba(16,185,129,.3);color:var(--accent-green);padding:4px 10px;border-radius:5px;font-size:11px;font-weight:700;cursor:pointer;transition:all .2s;}
        .btn-add-trade:hover{background:rgba(16,185,129,.2);}
        .btn-del{background:none;border:none;color:var(--text-muted);cursor:pointer;font-size:13px;padding:0 3px;transition:color .15s;}
        .btn-del:hover{color:var(--accent-red);}
        .modal-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.8);backdrop-filter:blur(4px);align-items:center;justify-content:center;z-index:50;}
        .modal-overlay.open{display:flex;}
        .modal-box{background:#0d1726;border:1px solid var(--border-bright);border-radius:16px;padding:28px;width:580px;max-height:92vh;overflow-y:auto;box-shadow:0 25px 60px rgba(0,0,0,.7);}
        .modal-label{font-size:11px;font-weight:600;color:var(--text-secondary);letter-spacing:.05em;text-transform:uppercase;margin-bottom:6px;display:block;}
        .modal-input{width:100%;background:var(--bg-input);border:1px solid var(--border-bright);color:var(--text-primary);padding:9px 12px;border-radius:7px;font-size:14px;font-family:'Inter',sans-serif;outline:none;transition:border-color .2s,box-shadow .2s;}
        .modal-input:focus{border-color:var(--accent-blue);box-shadow:0 0 0 3px rgba(59,130,246,.15);}
        .modal-input[readonly]{background:#060e1a;color:var(--text-secondary);cursor:not-allowed;}
        .net-preview{color:var(--accent-green)!important;font-family:'JetBrains Mono',monospace!important;font-size:16px!important;font-weight:600!important;}
        .net-negative{color:var(--accent-red)!important;}
        .divider{border:none;border-top:1px solid var(--border);margin:14px 0;}
        .stock-slot{background:rgba(10,22,40,.7);border:1px solid var(--border);border-radius:10px;padding:14px;margin-bottom:10px;}
        .stock-slot-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:10px;}
        .slot-num{font-size:11px;font-weight:700;color:var(--accent-cyan);letter-spacing:.05em;}
        .ac-wrap{position:relative;}
        .ac-list{position:absolute;top:calc(100% + 4px);left:0;right:0;background:#111f35;border:1px solid var(--border-bright);border-radius:8px;z-index:200;max-height:200px;overflow-y:auto;box-shadow:0 10px 30px rgba(0,0,0,.6);display:none;}
        .ac-list.open{display:block;}
        .ac-item{padding:9px 14px;cursor:pointer;display:flex;justify-content:space-between;align-items:center;border-bottom:1px solid rgba(30,58,95,.5);transition:background .15s;}
        .ac-item:last-child{border-bottom:none;}
        .ac-item:hover,.ac-item.active{background:rgba(59,130,246,.15);}
        .ac-ticker{font-family:'JetBrains Mono',monospace;font-weight:600;color:var(--accent-cyan);font-size:13px;}
        .ac-name{font-size:11px;color:var(--text-secondary);max-width:180px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
        .ac-exch{font-size:10px;color:var(--text-muted);background:rgba(30,58,95,.8);padding:2px 6px;border-radius:4px;}
        .ac-spinner{padding:10px 14px;color:var(--text-muted);font-size:12px;text-align:center;}
        .history-section{margin-top:16px;border-top:1px solid var(--border);padding-top:14px;}
        .history-table{width:100%;border-collapse:collapse;font-size:11px;}
        .history-table th{color:var(--text-muted);font-weight:600;text-align:left;padding:4px 6px;letter-spacing:.04em;text-transform:uppercase;border-bottom:1px solid var(--border);}
        .history-table td{padding:6px 6px;border-bottom:1px solid rgba(30,58,95,.4);color:var(--text-secondary);vertical-align:middle;}
        .history-table tr:last-child td{border-bottom:none;}
        .profit-pos{color:var(--accent-green);font-weight:700;font-family:'JetBrains Mono',monospace;}
        .profit-neg{color:var(--accent-red);font-weight:700;font-family:'JetBrains Mono',monospace;}
        .currency-badge{font-size:10px;font-weight:700;letter-spacing:.06em;padding:2px 8px;border-radius:4px;background:rgba(59,130,246,.15);border:1px solid rgba(59,130,246,.3);color:var(--accent-blue);}
        .leverage-bar-wrap{height:4px;background:rgba(30,58,95,.6);border-radius:2px;margin-top:6px;}
        .leverage-bar{height:100%;border-radius:2px;background:linear-gradient(90deg,var(--accent-amber),#ef4444);transition:width .5s;}
        .price-dot{display:inline-block;width:6px;height:6px;border-radius:50%;background:var(--accent-green);animation:pulse-dot 2s infinite;margin-right:4px;}
        @keyframes pulse-dot{0%,100%{opacity:1}50%{opacity:.3}}
        ::-webkit-scrollbar{width:5px;}::-webkit-scrollbar-track{background:transparent;}::-webkit-scrollbar-thumb{background:var(--border-bright);border-radius:3px;}
    </style>
</head>
<body class="p-4 md:p-8">
<div class="max-w-6xl mx-auto">
    <header class="text-center mb-10">
        <p class="text-xs font-semibold tracking-widest text-blue-400 uppercase mb-3 opacity-70">Investment Performance Battle</p>
        <h1 class="text-4xl md:text-5xl font-bold text-white mb-1 header-glow">🏆 投資績效大賽</h1>
        <p class="text-slate-400 mt-2 tracking-wide">KingJames &nbsp;⚔️&nbsp; 憂太 &nbsp;⚔️&nbsp; 恩仔</p>
        <div class="mt-5"><div class="countdown-badge"><span class="text-blue-300 font-semibold text-sm">⏱ 賽程倒數</span><span class="text-white font-bold ml-2 mono" id="countdown">計算中...</span></div></div>
        <div class="mt-4"><span id="system-status" class="status-pill status-loading">🟡 系統連線中...</span></div>
    </header>
    <section class="card p-6 mb-8">
        <h2 class="text-lg font-bold text-white mb-4 flex items-center gap-2"><span>📊</span> 即時排名 <span class="text-xs font-normal text-slate-400 ml-1">（新台幣計價）</span></h2>
        <div id="leaderboard" class="flex flex-col gap-3"></div>
    </section>
    <section class="grid grid-cols-1 md:grid-cols-3 gap-5" id="portfolios"></section>
</div>

<!-- 持倉 Modal -->
<div id="editModal" class="modal-overlay">
    <div class="modal-box">
        <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:20px;">
            <h2 class="text-lg font-bold text-white" id="modalTitle">更新部位</h2>
            <button onclick="closeModal()" class="text-slate-500 hover:text-white text-xl leading-none">&times;</button>
        </div>
        <input type="hidden" id="editName">
        <div style="display:grid;grid-template-columns:1fr 1fr 1fr;gap:12px;margin-bottom:14px;">
            <div><label class="modal-label">記帳幣別</label>
                <select id="editCurrency" onchange="updateModalSummary()" class="modal-input" style="cursor:pointer;">
                    <option value="USD">美元 (USD)</option><option value="TWD">新台幣 (TWD)</option>
                </select></div>
            <div><label class="modal-label">初始本金（鎖定）</label><input type="text" id="displayInitialCapital" readonly class="modal-input mono"></div>
            <div><label class="modal-label">當前現金水位</label><input type="number" id="editCash" oninput="updateModalSummary()" class="modal-input" placeholder="0"></div>
        </div>
        <div style="display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:14px;">
            <div><label class="modal-label" style="color:var(--accent-amber)">槓桿使用率 (%，最高60)</label>
                <input type="number" step="1" min="0" max="60" id="editLeverageRate" placeholder="0~60" oninput="clampLeverage();updateModalSummary();" class="modal-input" style="border-color:var(--accent-amber)"></div>
            <div><label class="modal-label">帳戶淨值預覽</label><input type="text" id="displayNetValue" readonly class="modal-input net-preview"></div>
        </div>
        <hr class="divider">
        <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:12px;">
            <label class="modal-label" style="margin:0">持股清單（最多 20 支）</label>
            <button class="btn-add-stock" onclick="addStockSlot()">＋ 新增持股</button>
        </div>
        <div id="stockSlots"></div>
        <div style="display:flex;justify-content:flex-end;gap:10px;margin-top:18px;">
            <button onclick="closeModal()" class="btn-cancel">取消</button>
            <button onclick="saveData()" class="btn-save">☁ 同步至雲端</button>
        </div>
    </div>
</div>

<!-- 歷史交易 Modal -->
<div id="tradeModal" class="modal-overlay" style="z-index:60">
    <div class="modal-box" style="width:420px;">
        <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:20px;">
            <h2 class="text-lg font-bold text-white" id="tradeModalTitle">新增交易紀錄</h2>
            <button onclick="closeTradeModal()" class="text-slate-500 hover:text-white text-xl leading-none">&times;</button>
        </div>
        <input type="hidden" id="tradeName">
        <div style="display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:12px;">
            <div><label class="modal-label">股票代號</label><input type="text" id="tradeTicker" placeholder="例: TSLA" class="modal-input" style="text-transform:uppercase;"></div>
            <div><label class="modal-label">股數</label><input type="number" id="tradeShares" placeholder="0" class="modal-input"></div>
        </div>
        <div style="display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:12px;">
            <div><label class="modal-label">買入價格</label><input type="number" step="0.01" id="tradeBuyPrice" placeholder="0.00" class="modal-input" oninput="calcTradePreview()"></div>
            <div><label class="modal-label">賣出價格</label><input type="number" step="0.01" id="tradeSellPrice" placeholder="0.00" class="modal-input" oninput="calcTradePreview()"></div>
        </div>
        <div style="margin-bottom:8px;"><label class="modal-label">損益金額（可手動覆蓋）</label><input type="number" step="0.01" id="tradePnl" placeholder="正數=獲利 負數=虧損" class="modal-input"></div>
        <div id="tradeCalcHint" class="hidden" style="margin-bottom:14px;font-size:12px;color:var(--text-secondary);">預計損益：<span id="tradeCalcValue" class="mono font-bold"></span></div>
        <div style="display:flex;justify-content:flex-end;gap:10px;">
            <button onclick="closeTradeModal()" class="btn-cancel">取消</button>
            <button onclick="saveTrade()" class="btn-save">＋ 新增紀錄</button>
        </div>
    </div>
</div>

<script>
const firebaseConfig={apiKey:"AIzaSyB0JZSBEgE11JQvPINRIHkztapNazgCrPU",authDomain:"investment-competition.firebaseapp.com",databaseURL:"https://investment-competition-default-rtdb.firebaseio.com",projectId:"investment-competition",storageBucket:"investment-competition.firebasestorage.app",messagingSenderId:"1086646313342",appId:"1:1086646313342:web:8a4607827ade76528a532f"};
if(!firebase.apps.length)firebase.initializeApp(firebaseConfig);
const db=firebase.database();
const FINNHUB_KEY='d7tibnpr01qugn0ann00d7tibnpr01qugn0ann0g';
const MAX_STOCKS=20;
let participants=[],usdToTwd=32.5;

function getFixedInitialCapital(c){return c==='USD'?3161.5:100000;}
const defaultData=[
    {name:"KingJames",currency:"USD",cash:3161.5,leverageRate:0,stocks:[],trades:[]},
    {name:"憂太",currency:"TWD",cash:100000,leverageRate:0,stocks:[],trades:[]},
    {name:"恩仔",currency:"USD",cash:3161.5,leverageRate:0,stocks:[],trades:[]}
];

async function fetchExchangeRate(){try{const r=await fetch('https://open.er-api.com/v6/latest/USD');const d=await r.json();if(d.rates?.TWD)usdToTwd=d.rates.TWD;}catch(e){}}

async function fetchStockPrice(ticker){
    if(!ticker)return null;
    if(ticker.endsWith('.TW')||ticker.endsWith('.TWO'))return fetchTWSEPrice(ticker);
    return fetchFinnhubPrice(ticker);
}
async function fetchFinnhubPrice(ticker){
    try{const r=await fetch(`https://finnhub.io/api/v1/quote?symbol=${encodeURIComponent(ticker)}&token=${FINNHUB_KEY}`,{signal:AbortSignal.timeout(8000)});const d=await r.json();return(d.c&&d.c>0)?d.c:(d.pc>0?d.pc:null);}catch(e){return null;}
}
async function fetchTWSEPrice(ticker){
    // 台股改用 Finnhub，代號格式：2330.TW → 直接送
    // Finnhub 台股 exchange symbol 格式為 "TWSE:2330"
    const code = ticker.replace('.TW','').replace('.TWO','');
    const finnhubSymbol = `TWSE:${code}`;
    try{
        const r = await fetch(`https://finnhub.io/api/v1/quote?symbol=${encodeURIComponent(finnhubSymbol)}&token=${FINNHUB_KEY}`,{signal:AbortSignal.timeout(8000)});
        const d = await r.json();
        const price = (d.c && d.c > 0) ? d.c : (d.pc && d.pc > 0 ? d.pc : null);
        if(price && price > 0){ console.log('台股Finnhub成功', finnhubSymbol, price); return price; }
    }catch(e){ console.warn('台股Finnhub失敗', finnhubSymbol, e.message); }

    // 備援：allorigins + Yahoo Finance v8
    try{
        const yfUrl = `https://query1.finance.yahoo.com/v8/finance/chart/${encodeURIComponent(ticker)}?interval=1d&range=5d`;
        const r = await fetch(`https://api.allorigins.win/get?url=${encodeURIComponent(yfUrl)}`,{signal:AbortSignal.timeout(8000)});
        const outer = await r.json();
        const raw = JSON.parse(outer.contents);
        const meta = raw?.chart?.result?.[0]?.meta;
        const price = meta?.regularMarketPrice || meta?.chartPreviousClose || null;
        if(price && price > 0){ console.log('台股YF成功', ticker, price); return price; }
    }catch(e){ console.warn('台股YF備援失敗', ticker, e.message); }

    return null;
}

async function searchTickers(query){
    if(!query)return[];
    try{const r=await fetch(`https://finnhub.io/api/v1/search?q=${encodeURIComponent(query)}&token=${FINNHUB_KEY}`,{signal:AbortSignal.timeout(5000)});const d=await r.json();
    return(d?.result||[]).filter(q=>q.type==='Common Stock'||q.type==='ETP'||q.type==='ADR').slice(0,8).map(q=>({symbol:q.symbol,shortname:q.description,exchDisp:q.type}));}catch{return[];}
}
document.addEventListener('click',e=>{if(!e.target.closest('.ac-wrap'))document.querySelectorAll('.ac-list').forEach(l=>l.classList.remove('open'));});

function clampLeverage(){const el=document.getElementById('editLeverageRate');let v=parseFloat(el.value);if(isNaN(v)||v<0)v=0;if(v>60)v=60;el.value=v;}
function updateModalSummary(){
    const currency=document.getElementById('editCurrency').value;
    const initCap=getFixedInitialCapital(currency);
    document.getElementById('displayInitialCapital').value=fmtRaw(initCap,currency);
    const cash=parseFloat(document.getElementById('editCash').value)||0;
    const lev=Math.min(Math.max(parseFloat(document.getElementById('editLeverageRate').value)||0,0),60);
    const borrowed=cash*(lev/100);
    let stockValue=0;
    document.querySelectorAll('.stock-slot').forEach(slot=>{
        const shares=parseFloat(slot.querySelector('.slot-shares').value)||0;
        const price=parseFloat(slot.querySelector('.slot-cur-hidden').value)||0;
        stockValue+=shares*price;
    });
    const netVal=stockValue-borrowed+cash;
    const preview=document.getElementById('displayNetValue');
    preview.value=(netVal<0?'-':'')+fmtRaw(Math.abs(netVal),currency);
    preview.classList.toggle('net-negative',netVal<0);
}

function saveData(){
    const name=document.getElementById('editName').value;
    const pi=participants.findIndex(p=>p.name===name);if(pi===-1)return;
    const lv=Math.min(Math.max(parseFloat(document.getElementById('editLeverageRate').value)||0,0),60);
    const newStocks=[];
    document.querySelectorAll('.stock-slot').forEach(slot=>{
        const ticker=(slot.querySelector('.slot-ticker').value||'').toUpperCase().trim();
        const shares=parseFloat(slot.querySelector('.slot-shares').value)||0;
        const buyPrice=parseFloat(slot.querySelector('.slot-buyprice').value)||0;
        const currentPrice=parseFloat(slot.querySelector('.slot-cur-hidden').value)||0;
        if(ticker&&shares>0)newStocks.push({ticker,shares,buyPrice,currentPrice});
    });
    const updated={...participants[pi],currency:document.getElementById('editCurrency').value,cash:parseFloat(document.getElementById('editCash').value)||0,leverageRate:lv,stocks:newStocks};
    db.ref('competitionData/'+pi).set(updated);
    closeModal();setStatus('loading','🟡 同步變更中...');
}

// ── 歷史交易 Modal ────────────────────────
function openTradeModal(name){
    document.getElementById('tradeName').value=name;
    document.getElementById('tradeModalTitle').textContent=`新增交易紀錄 — ${name}`;
    ['tradeTicker','tradeShares','tradeBuyPrice','tradeSellPrice','tradePnl'].forEach(id=>document.getElementById(id).value='');
    document.getElementById('tradeCalcHint').classList.add('hidden');
    document.getElementById('tradeModal').classList.add('open');
}
function closeTradeModal(){document.getElementById('tradeModal').classList.remove('open');}
function calcTradePreview(){
    const sh=parseFloat(document.getElementById('tradeShares').value)||0;
    const bp=parseFloat(document.getElementById('tradeBuyPrice').value)||0;
    const sp=parseFloat(document.getElementById('tradeSellPrice').value)||0;
    if(sh>0&&bp>0&&sp>0){const pnl=(sp-bp)*sh;const el=document.getElementById('tradeCalcValue');el.textContent=(pnl>=0?'+':'')+pnl.toFixed(2);el.className='mono font-bold '+(pnl>=0?'text-emerald-400':'text-red-400');document.getElementById('tradePnl').value=pnl.toFixed(2);document.getElementById('tradeCalcHint').classList.remove('hidden');}
}
function saveTrade(){
    const name=document.getElementById('tradeName').value;const pi=participants.findIndex(p=>p.name===name);if(pi===-1)return;
    const ticker=document.getElementById('tradeTicker').value.toUpperCase().trim();
    const shares=parseFloat(document.getElementById('tradeShares').value)||0;
    const buyPrice=parseFloat(document.getElementById('tradeBuyPrice').value)||0;
    const sellPrice=parseFloat(document.getElementById('tradeSellPrice').value)||0;
    const pnl=parseFloat(document.getElementById('tradePnl').value)||0;
    if(!ticker||shares<=0){alert('請填入股票代號和股數');return;}
    const t=[...(participants[pi].trades||[]),{ticker,shares,buyPrice,sellPrice,pnl,date:new Date().toLocaleDateString('zh-TW')}];
    db.ref('competitionData/'+pi+'/trades').set(t);
    closeTradeModal();setStatus('loading','🟡 同步交易紀錄中...');
}
function deleteTrade(name,idx){
    if(!confirm('確定刪除這筆交易紀錄？'))return;
    const pi=participants.findIndex(p=>p.name===name);if(pi===-1)return;
    const t=[...(participants[pi].trades||[])];t.splice(idx,1);
    db.ref('competitionData/'+pi+'/trades').set(t);
}

document.addEventListener('keydown',e=>{if(e.key==='Escape'){closeModal();closeTradeModal();}});

const endDate=new Date('2026-11-04T00:00:00').getTime();
(function tick(){const d=endDate-Date.now();if(d<0){document.getElementById('countdown').textContent='比賽已結束！';return;}
document.getElementById('countdown').textContent=`${Math.floor(d/86400000)} 天 ${Math.floor(d%86400000/3600000)} 時 ${Math.floor(d%3600000/60000)} 分`;setTimeout(tick,60000);})();
</script>
